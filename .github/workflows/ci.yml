name: CI - Build and Test

on:
  pull_request:
    branches: ['main']
  push:
    branches: ['main']
  workflow_dispatch:

jobs:
  test-and-build:
    name: Test and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Verify static site files
        run: |
          test -f site/index.html
          test -f site/styles.css
          test -f site/CNAME
          test -f site/.nojekyll
          test -f site/food-shelf.html
          test -f site/thrift-store.html
          test -f site/volunteer.html
          test -f site/donations.html
          test -f site/about.html
          test -f site/resources.html
          test -f site/feedback.html
          test -f site/visit.html
          test -f site/policies.html
          test -f site/privacy-policy.html
          test -f site/cookie-policy.html
          test -f site/terms-of-service.html
          test -f site/donation-policy.html
          test -f site/free-for-charity-donation-policy.html
          test -f site/vulnerability-disclosure-policy.html
          test -f site/security-acknowledgements.html
          test -f site/assets/gac-home-hero.svg
          test -f site/assets/gac-front-hero.svg
          test -f site/assets/garrison-walleye-statue.svg
